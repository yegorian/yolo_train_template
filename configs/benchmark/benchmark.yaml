# =============================================================================
# Конфигурационный файл для бенчмаркинга YOLO модели
# =============================================================================
# Этот файл содержит параметры для оценки обученной модели.
# Документация: https://docs.ultralytics.com/modes/val/
# =============================================================================

# -----------------------------------------------------------------------------
# ОБЩИЕ ПАРАМЕТРЫ
# -----------------------------------------------------------------------------
task: detect                           # Тип задачи: 'detect' или 'segment'
model: log/detection_experiment/weights/best.pt  # Путь к весам модели
data: ./data/my_dataset/data.yaml  # Путь к файлу data.yaml с описанием датасета

# -----------------------------------------------------------------------------
# ПАРАМЕТРЫ ИНФЕРЕНСА
# -----------------------------------------------------------------------------
imgsz: 512                            # Размер входного изображения
batch: 8                              # Размер батча
device: null                          # Устройство: 0, 'cpu', [0,1,2,3], или null (auto)
conf: 0.25                            # Порог уверенности для детекции
iou: 0.70                             # Порог IoU для NMS (Non-Maximum Suppression)
max_det: 300                          # Максимальное количество детекций на изображение

# -----------------------------------------------------------------------------
# ПАРАМЕТРЫ ВАЛИДАЦИИ
# -----------------------------------------------------------------------------
split: val                            # Сплит для оценки: 'train', 'val', 'test'
save_json: False                      # Сохранять результаты в JSON формате
amp: True                             # Automatic Mixed Precision
plots: True                           # Сохранять графики метрик (confusion matrix, PR curves)

# -----------------------------------------------------------------------------
# ВИЗУАЛИЗАЦИЯ ПРЕДСКАЗАНИЙ
# -----------------------------------------------------------------------------
visualize: True                       # Сохранять изображения с предсказаниями
max_visualizations: 50                # Максимальное число визуализаций
make_visualize_comparison: True           # Визуализировать сравнение Prediction vs GT

# -----------------------------------------------------------------------------
# ДОПОЛНИТЕЛЬНЫЕ ПАРАМЕТРЫ
# -----------------------------------------------------------------------------
verbose: True                         # Выводить подробную информацию
exist_ok: False                       # Перезаписывать существующие файлы
