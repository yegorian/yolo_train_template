# =============================================================================
# Конфигурационный файл для обучения YOLO модели (детекция или сегментация)
# =============================================================================
# Этот файл содержит все параметры для обучения модели YOLO.
# Документация: https://docs.ultralytics.com/modes/train/
# =============================================================================

# -----------------------------------------------------------------------------
# ОБЩИЕ ПАРАМЕТРЫ
# -----------------------------------------------------------------------------
model: yolov8n.pt                     # Путь к модели: yolov8n.pt, yolov8s.pt, yolov8m.pt,
                                      # yolov8n-seg.pt, yolov8s-seg.pt, yolov8m-seg.pt,
                                      # или путь к своим весам: 'path/to/weights.pt'
                                      # или .yaml конфиг для обучения с нуля
data: ./data/my_dataset/data.yaml # Путь к файлу data.yaml с описанием датасета

# -----------------------------------------------------------------------------
# ПАРАМЕТРЫ ОБУЧЕНИЯ
# -----------------------------------------------------------------------------
epochs: 100                           # Количество эпох обучения
time: null                            # Максимальное время обучения в часах (приоритет над epochs)
patience: 100                         # Эпох без улучшения до ранней остановки
batch: 16                             # Размер батча: int, -1 (auto 60%), или fraction (0.70)
imgsz: 640                            # Размер входного изображения (квадрат)
save: True                            # Сохранять чекпоинты
save_period: -1                       # Сохранять чекпоинт каждые N эпох (-1 = отключено)
cache: False                          # Кэширование изображений (True/ram/disk/False)
device: null                          # Устройство: 0, 'cpu', [0,1,2,3], или null (auto)
workers: 8                            # Количество воркеров для загрузки данных (на GPU)
project: log                          # Директория для сохранения результатов
name: train_experiment                # Имя эксперимента (создаст подпапку)
exist_ok: False                       # Перезаписывать существующую папку
resume: False                         # Продолжить обучение с последнего чекпоинта
pretrained: True                      # Использовать предобученные веса (True/False/путь)
seed: 0                               # Сид для воспроизводимости
deterministic: True                   # Детерминированный режим (воспроизводимо, но медленнее)
verbose: True                         # Выводить подробную информацию
plots: True                           # Сохранять графики обучения и валидации

# -----------------------------------------------------------------------------
# ОПТИМИЗАТОР И СКОРОСТЬ ОБУЧЕНИЯ
# -----------------------------------------------------------------------------
optimizer: auto                       # Оптимизатор: SGD, Adam, AdamW, RMSprop, auto
lr0: 0.01                             # Начальная скорость обучения (SGD=1E-2, Adam=1E-3)
lrf: 0.01                             # Конечная скорость обучения (lr0 * lrf)
momentum: 0.937                       # Моментум для SGD / beta1 для Adam
weight_decay: 0.0005                  # L2 регуляризация
warmup_epochs: 3.0                    # Количество эпох разогрева
warmup_momentum: 0.8                  # Моментум во время разогрева
warmup_bias_lr: 0.1                   # Скорость обучения для bias во время разогрева
cos_lr: False                         # Cosine learning rate scheduler
close_mosaic: 10                      # Отключить mosaic за N эпох до конца (0 = не отключать)

# -----------------------------------------------------------------------------
# ФУНКЦИИ ПОТЕРЬ
# -----------------------------------------------------------------------------
box: 7.5                              # Вес box loss
cls: 0.5                              # Вес classification loss
dfl: 1.5                              # Вес distribution focal loss
nbs: 64                               # Nominal batch size для нормализации loss

# -----------------------------------------------------------------------------
# АУГМЕНТАЦИИ ДАННЫХ
# -----------------------------------------------------------------------------
# HSV аугментации
hsv_h: 0.015                          # Hue augmentation (0.0-1.0)
hsv_s: 0.7                            # Saturation augmentation (0.0-1.0)
hsv_v: 0.4                            # Value augmentation (0.0-1.0)

# Геометрические аугментации
degrees: 0.0                          # Поворот изображения (градусы)
translate: 0.1                        # Смещение изображения (доля размера)
scale: 0.5                            # Масштабирование изображения
shear: 0.0                            # Сдвиг изображения (градусы)
perspective: 0.0                      # Перспективное искажение (0.0-0.001)

# Отражения
flipud: 0.0                           # Вертикальное отражение (вероятность)
fliplr: 0.5                           # Горизонтальное отражение (вероятность)
bgr: 0.0                              # RGB -> BGR отражение (вероятность)

# Сложные аугментации
mosaic: 1.0                           # Mosaic augmentation (вероятность)
mixup: 0.0                            # MixUp augmentation (вероятность)
cutmix: 0.0                           # CutMix augmentation (вероятность)
copy_paste: 0.0                       # Copy-Paste augmentation (вероятность)

# Дополнительные
multi_scale: 0.0                      # Вариация размера изображения (0.0-1.0)
erasing: 0.4                          # Random erasing probability (для classify)

# -----------------------------------------------------------------------------
# ВАЛИДАЦИЯ
# -----------------------------------------------------------------------------
val: True                             # Запускать валидацию во время обучения
split: val                            # Сплит для валидации: 'train', 'val', 'test'
amp: True                             # Automatic Mixed Precision (снижает память, ускоряет)

# -----------------------------------------------------------------------------
# ДОПОЛНИТЕЛЬНЫЕ ПАРАМЕТРЫ
# -----------------------------------------------------------------------------
single_cls: False                     # Обучать как один класс (игнорировать различия)
rect: False                           # Rectangular training (минимальный padding)
freeze: null                          # Заморозить первые N слоев или [список слоев]
classes: null                         # Список классов для обучения (фильтрация)
fraction: 1.0                         # Доля датасета для обучения (0.0-1.0)
profile: False                        # Профилирование ONNX/TensorRT скоростей
max_det: 300                          # Максимум детекций при валидации
overlap_mask: True                    # Объединять перекрывающиеся маски
mask_ratio: 4                         # Downsample ratio для масок сегментации
dropout: 0.0                          # Dropout rate (для classify задач)
